spring.application.name=AuthenticationSystem
logging.level.org.springframework.security=DEBUG.


#MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/authentication_system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Zoro@2004

#jpa / hibernate config
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#JWT Properties
jwt.secret-key=${JWT_SECRET}
jwt.access-token-expiration=15m
jwt.refresh-token-expiration=7d

#Cookies Properties
app.cookie.http-only=true
app.cookie.secure=false
app.cookie.path=/api/auth
app.cookie.same-site=Strict
app.cookie.max-age=7m

